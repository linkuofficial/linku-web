  <!-- wordmark -->
  <text x="92" y="370" fill="#e8e6e0" font-family="Arial, Helvetica, sans-serif"
        font-size="180" font-weight="800" letter-spacing="8">LINKU</text>

  <!-- tagline -->
  <text x="96" y="450" fill="#e8e6e0" fill-opacity="0.85" font-family="Arial, Helvetica, sans-serif"
