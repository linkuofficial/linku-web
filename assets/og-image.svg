<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="glow" cx="22%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#2ec27e" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#2ec27e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="#0a0a0a"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- faint particle field -->
  <g fill="#e8e6e0" fill-opacity="0.10">
    <circle cx="960" cy="120" r="3"/>
    <circle cx="1040" cy="210" r="2"/>
    <circle cx="880" cy="240" r="2"/>
    <circle cx="1100" cy="330" r="3"/>
    <circle cx="980" cy="430" r="2"/>
    <circle cx="1060" cy="520" r="2"/>
    <circle cx="900" cy="500" r="3"/>
  </g>

  <!-- kicker -->
  <text x="96" y="180" fill="#6a6a6a" font-family="Arial, Helvetica, sans-serif"
