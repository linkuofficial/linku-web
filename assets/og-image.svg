  <!-- footer -->
  <circle cx="104" cy="556" r="7" fill="#2ec27e"/>
  <text x="124" y="565" fill="#e8e6e0" font-family="Arial, Helvetica, sans-serif"
        font-size="30" letter-spacing="2">linku.tech</text>
